<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Бекас — прикормочные кораблики</title>
    <style>
        /* ===== СБРОС ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fa;
            padding-top: 100px; /* отступ под шапку */
        }

        /* ===== ШАПКА ===== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100px; /* увеличено с 50px до 100px */
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
            border-bottom: 1px solid #222;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* --- ЛЕВЫЙ БЛОК: логотип (увеличенный) --- */
        .header__left {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            min-width: 80px; /* чтобы не сжимался */
        }

        .header__logo {
            width: 60px; /* увеличено с 38px до 60px */
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 0 3px #333, 0 0 0 6px #d4a84b;
            transition: 0.2s;
            flex-shrink: 0;
            display: block;
            background: #1a1a1a;
        }

        .header__logo:hover {
            transform: scale(1.05);
        }

        /* --- ЦЕНТР: мерцающая кнопка (строго по центру) --- */
        .header__center {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 15px;
        }

        .header__order-btn {
            background: #d4a84b;
            color: #000;
            font-weight: 700;
            font-size: 18px; /* чуть увеличен шрифт */
            padding: 10px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.2s;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(212, 168, 75, 0.3);
            animation: pulse-glow 1.8s ease-in-out infinite;
            white-space: nowrap;
        }

        .header__order-btn:hover {
            background: #c49a3e;
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(212, 168, 75, 0.7);
        }

        @keyframes pulse-glow {
            0%   { box-shadow: 0 0 5px rgba(212, 168, 75, 0.2); }
            50%  { box-shadow: 0 0 25px rgba(212, 168, 75, 0.9), 0 0 50px rgba(212, 168, 75, 0.2); }
            100% { box-shadow: 0 0 5px rgba(212, 168, 75, 0.2); }
        }

        /* --- ПРАВЫЙ БЛОК: телефон + иконки --- */
        .header__right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            min-width: 280px; /* чтобы не сжимался */
            justify-content: flex-end;
        }

        .header__phone {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 0.5px;
            white-space: nowrap;
            margin-right: 4px; /* смещение чуть левее */
            transition: 0.2s;
        }

        .header__phone:hover {
            color: #d4a84b;
        }

        .header__socials {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header__social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px; /* увеличено с 26px до 34px */
            height: 34px;
            border-radius: 50%;
            background: #1a1a1a;
            color: #aaa;
            text-decoration: none;
            font-size: 17px; /* увеличено с 13px до 17px */
            font-weight: 700;
            transition: 0.25s;
            border: 1px solid #333;
        }

        .header__social-link:hover {
            background: #d4a84b;
            color: #000;
            border-color: #d4a84b;
            transform: scale(1.1);
        }

        .header__social-label {
            color: #888;
            font-size: 13px;
            font-weight: 500;
            margin-left: 2px;
            letter-spacing: 0.3px;
        }

        /* ===== КОНТЕНТ (демо) ===== */
        .content {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .content h1 {
            font-size: 2.2rem;
            color: #0a2a44;
            margin-bottom: 20px;
        }

        .content p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #222;
            margin-bottom: 15px;
        }

        .content .placeholder {
            background: #e9ecf0;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            color: #555;
            font-size: 1.2rem;
            margin-top: 30px;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 900px) {
            .header__order-btn {
                font-size: 15px;
                padding: 8px 28px;
            }
            .header__phone {
                font-size: 14px;
            }
            .header__logo {
                width: 50px;
                height: 50px;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 15px;
                height: 85px;
            }
            body {
                padding-top: 85px;
            }
            .header__logo {
                width: 44px;
                height: 44px;
            }
            .header__order-btn {
                font-size: 13px;
                padding: 6px 18px;
            }
            .header__phone {
                font-size: 13px;
            }
            .header__social-link {
                width: 30px;
                height: 30px;
                font-size: 15px;
            }
            .header__right {
                min-width: auto;
                gap: 5px;
            }
            .header__social-label {
                display: none;
            }
        }

        @media (max-width: 600px) {
            .header {
                height: 70px;
                padding: 0 12px;
            }
            body {
                padding-top: 70px;
            }
            .header__logo {
                width: 36px;
                height: 36px;
                box-shadow: 0 0 0 2px #333, 0 0 0 4px #d4a84b;
            }
            .header__order-btn {
                font-size: 11px;
                padding: 5px 14px;
                box-shadow: 0 0 5px rgba(212, 168, 75, 0.3);
            }
            .header__phone {
                font-size: 11px;
            }
            .header__social-link {
                width: 26px;
                height: 26px;
                font-size: 13px;
            }
            .header__right {
                gap: 4px;
            }
        }

        @media (max-width: 420px) {
            .header__phone {
                display: none;
            }
            .header__social-link {
                width: 24px;
                height: 24px;
                font-size: 11px;
            }
            .header__order-btn {
                font-size: 10px;
                padding: 4px 10px;
            }
            .header__logo {
                width: 30px;
                height: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ШАПКА ===== -->
    <header class="header">
        <!-- Логотип слева (увеличенный) -->
        <div class="header__left">
            <img src="images/bek.jpg" alt="Бекас" class="header__logo" />
        </div>

        <!-- Мерцающая кнопка строго по центру -->
        <div class="header__center">
            <button class="header__order-btn" onclick="alert('📞 Свяжитесь с нами для заказа!')">Заказать</button>
        </div>

        <!-- Телефон + соцсети справа -->
        <div class="header__right">
            <a href="tel:+79158706979" class="header__phone">+7 915 870 69 79</a>
            <div class="header__socials">
                <a href="#" class="header__social-link" title="YouTube">▶</a>
                <a href="#" class="header__social-link" title="Telegram">✈</a>
                <a href="#" class="header__social-link" title="WhatsApp">💬</a>
                <span class="header__social-label">макс</span>
            </div>
        </div>
    </header>

    <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
    <main class="content">
        <h1>Прикормочные кораблики «Бекас»</h1>
        <p>Российский производитель. Гарантия 1 год. Доставка по РФ.</p>
        <p>Модели: SpeeD v4, Mono, Solo. Более 26 модификаций.</p>

        <div class="placeholder">
            Здесь будет основной контент сайта<br />
            (слайдер, опции, формы и т.д.)
        </div>
    </main>

</body>
</html>
