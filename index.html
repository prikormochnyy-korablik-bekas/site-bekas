<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Бекас — прикормочные кораблики</title>
    <style>
        /* ===== СБРОС ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fa;
            padding-top: 100px;
        }

        /* ===== ШАПКА ===== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            border-bottom: 1px solid #222;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* --- ЛЕВЫЙ БЛОК: логотип --- */
        .header__left {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .header__logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #d4a84b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: #000;
            box-shadow: 0 0 0 2px #333, 0 0 0 4px #d4a84b;
            transition: 0.2s;
            user-select: none;
            flex-shrink: 0;
        }

        /* --- ЦЕНТР: мерцающая кнопка --- */
        .header__center {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 10px;
        }

        .header__order-btn {
            background: #d4a84b;
            color: #000;
            font-weight: 700;
            font-size: 14px;
            padding: 6px 28px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: 0.2s;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(212, 168, 75, 0.3);
            animation: pulse-glow 1.8s ease-in-out infinite;
            white-space: nowrap;
        }

        .header__order-btn:hover {
            background: #c49a3e;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(212, 168, 75, 0.6);
        }

        @keyframes pulse-glow {
            0%   { box-shadow: 0 0 5px rgba(212, 168, 75, 0.2); }
            50%  { box-shadow: 0 0 20px rgba(212, 168, 75, 0.8), 0 0 40px rgba(212, 168, 75, 0.2); }
            100% { box-shadow: 0 0 5px rgba(212, 168, 75, 0.2); }
        }

        /* --- ПРАВЫЙ БЛОК: телефон + иконки --- */
        .header__right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header__phone {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .header__phone:hover {
            color: #d4a84b;
        }

        .header__socials {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header__social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #1a1a1a;
            color: #aaa;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            transition: 0.25s;
            border: 1px solid #333;
        }

        .header__social-link:hover {
            background: #d4a84b;
            color: #000;
            border-color: #d4a84b;
            transform: scale(1.1);
        }

        /* ===== КОНТЕНТ (демо) ===== */
        .content {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .content h1 {
            font-size: 2.2rem;
            color: #0a2a44;
            margin-bottom: 20px;
        }

        .content p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #222;
            margin-bottom: 15px;
        }

        .content .placeholder {
            background: #e9ecf0;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            color: #555;
            font-size: 1.2rem;
            margin-top: 30px;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 700px) {
            .header {
                padding: 0 12px;
            }
            .header__logo {
                width: 32px;
                height: 32px;
                font-size: 12px;
            }
            .header__order-btn {
                font-size: 11px;
                padding: 4px 16px;
            }
            .header__phone {
                font-size: 12px;
            }
            .header__social-link {
                width: 22px;
                height: 22px;
                font-size: 10px;
            }
            .header__right {
                gap: 6px;
            }
        }

        @media (max-width: 550px) {
            .header__phone {
                display: none;
            }
            .header__social-link {
                width: 26px;
                height: 26px;
                font-size: 12px;
            }
        }

        @media (max-width: 420px) {
            .header__order-btn {
                font-size: 9px;
                padding: 3px 10px;
            }
            .header__logo {
                width: 26px;
                height: 26px;
                font-size: 10px;
            }
            .header__social-link {
                width: 22px;
                height: 22px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ШАПКА ===== -->
    <header class="header">
        <!-- Логотип слева -->
        <div class="header__left">
            <div class="header__logo" title="Бекас">Б</div>
        </div>

        <!-- Мерцающая кнопка по центру -->
        <div class="header__center">
            <button class="header__order-btn" onclick="alert('📞 Свяжитесь с нами для заказа!')">Заказать</button>
        </div>

        <!-- Телефон + соцсети справа -->
        <div class="header__right">
            <a href="tel:+79158706979" class="header__phone">+7 915 870 69 79</a>
            <div class="header__socials">
                <a href="#" class="header__social-link" title="YouTube">▶</a>
                <a href="#" class="header__social-link" title="Telegram">✈</a>
                <a href="#" class="header__social-link" title="WhatsApp">💬</a>
                <span style="color:#888; font-size:12px; font-weight:500; margin-left:2px;">макс</span>
            </div>
        </div>
    </header>

    <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
    <main class="content">
        <h1>Прикормочные кораблики «Бекас»</h1>
        <p>Российский производитель. Гарантия 1 год. Доставка по РФ.</p>
        <p>Модели: SpeeD v4, Mono, Solo. Более 26 модификаций.</p>

        <div class="placeholder">
            Здесь будет основной контент сайта<br />
            (слайдер, опции, формы и т.д.)
        </div>
    </main>

</body>
</html>
